<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои тренировки 💪</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 2px solid #ffd700;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5rem;
            color: #ffd700;
            margin-bottom: 10px;
        }

        header p {
            color: #aaa;
            font-size: 1.1rem;
        }

        .card {
            background: rgba(22, 33, 62, 0.8);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        .card h2 {
            color: #ffd700;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #aaa;
            font-size: 0.95rem;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 1rem;
        }

        .form-group input:focus {
            outline: none;
            border-color: #ffd700;
        }

        .form-group .optional {
            color: #666;
            font-size: 0.85rem;
        }

        .btn {
            display: inline-block;
            padding: 12px 25px;
            border-radius: 12px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }
        .btn-primary {
            background: linear-gradient(45deg, #ff6b6b, #ee5a24);
            color: white;
            width: 100%;
            font-size: 1.1rem;
            margin-top: 15px;
        }

        .btn:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 20px rgba(238, 90, 36, 0.6);
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        .user-info {
            background: rgba(255, 215, 0, 0.1);
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .user-info .username {
            font-size: 1.3rem;
            color: #ffd700;
            font-weight: bold;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-item {
            background: rgba(255, 215, 0, 0.1);
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid rgba(255, 215, 0, 0.3);        }

        .stat-item .value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ffd700;
        }

        .stat-item .label {
            font-size: 0.85rem;
            color: #aaa;
            margin-top: 5px;
        }

        .workout-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            border-left: 4px solid #ffd700;
        }

        .workout-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .workout-exercise {
            font-weight: bold;
            font-size: 1.1rem;
            color: #ffd700;
        }

        .workout-date {
            color: #aaa;
            font-size: 0.85rem;
        }

        .workout-details {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            color: #ccc;
            font-size: 0.95rem;
        }

        .btn-group {
            display: flex;            gap: 10px;
            margin-top: 20px;
        }

        .btn-group .btn {
            flex: 1;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #aaa;
        }

        .empty-state .icon {
            font-size: 4rem;
            margin-bottom: 15px;
        }

        .nav-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .nav-tab {
            flex: 1;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 12px;
            color: #fff;
            cursor: pointer;
            text-align: center;
        }

        .nav-tab.active {
            background: rgba(255, 215, 0, 0.2);
            border-color: #ffd700;
            color: #ffd700;
        }

        .modal {
            display: none;
            position: fixed;            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: #16213e;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            border: 2px solid #ffd700;
        }

        .modal-content h2 {
            color: #ffd700;
            margin-bottom: 20px;
            text-align: center;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-save {
            background: linear-gradient(45deg, #4caf50, #45a049);
            color: white;
        }

        .btn-cancel {            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>💪 Мои тренировки</h1>
            <p>Трекер прогресса</p>
        </header>

        <!-- Страница регистрации -->
        <div id="registerPage" class="page active">
            <div class="card">
                <h2>🔐 Регистрация</h2>
                <p style="color: #aaa; margin-bottom: 20px;">
                    Введи свои данные для начала работы
                </p>
                
                <div class="form-group">
                    <label>Твой Telegram ник</label>
                    <input type="text" id="regUsername" placeholder="@username">
                </div>
                
                <div class="form-group">
                    <label>Вес (кг) <span class="optional">— необязательно</span></label>
                    <input type="number" id="regWeight" placeholder="55">
                </div>
                
                <div class="form-group">
                    <label>Рост (см) <span class="optional">— необязательно</span></label>
                    <input type="number" id="regHeight" placeholder="165">
                </div>
                
                <button class="btn btn-primary" id="registerBtn">Зарегистрироваться</button>
            </div>
        </div>

        <!-- Главная страница -->
        <div id="mainPage" class="page">
            <div class="user-info">
                <span class="username" id="displayUsername">@username</span>
            </div>

            <div class="card">
                <h2>📊 Статистика</h2>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="value" id="totalWorkouts">0</div>                        <div class="label">Тренировок</div>
                    </div>
                    <div class="stat-item">
                        <div class="value" id="totalReps">0</div>
                        <div class="label">Всего повторений</div>
                    </div>
                    <div class="stat-item">
                        <div class="value" id="totalSets">0</div>
                        <div class="label">Всего подходов</div>
                    </div>
                    <div class="stat-item">
                        <div class="value" id="lastDays">0</div>
                        <div class="label">Дней подряд</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <h2>🏆 Последние результаты</h2>
                <div id="recentWorkouts">
                    <div class="empty-state">
                        <div class="icon">🏋️</div>
                        <p>Пока нет тренировок</p>
                    </div>
                </div>
                
                <div class="btn-group">
                    <button class="btn btn-primary" id="addWorkoutBtn">+ Добавить тренировку</button>
                    <button class="btn btn-secondary" id="historyBtn">📜 История</button>
                </div>
            </div>
        </div>

        <!-- Страница истории -->
        <div id="historyPage" class="page">
            <div class="nav-tabs">
                <div class="nav-tab" id="backToMain">🏠 Главная</div>
                <div class="nav-tab active">📜 История</div>
            </div>

            <div class="card">
                <h2>📜 История тренировок</h2>
                <div id="workoutList"></div>
            </div>
        </div>
    </div>

    <!-- Модальное окно: Тренировка -->
    <div class="modal" id="workoutModal">
        <div class="modal-content">            <h2>Новая тренировка</h2>
            <div class="form-group">
                <label>Упражнение</label>
                <input type="text" id="exercise" placeholder="Например: Отжимания">
            </div>
            <div class="form-group">
                <label>Повторения</label>
                <input type="number" id="reps" placeholder="10" min="1">
            </div>
            <div class="form-group">
                <label>Подходы <span class="optional">— необязательно</span></label>
                <input type="number" id="sets" placeholder="3" min="1">
            </div>
            <div class="form-group">
                <label>Вес (кг) <span class="optional">— необязательно</span></label>
                <input type="number" id="weight" placeholder="0" min="0" step="0.5">
            </div>
            <div class="modal-buttons">
                <button class="btn-cancel" id="cancelWorkoutBtn">Отмена</button>
                <button class="btn-save" id="saveWorkoutBtn">Сохранить</button>
            </div>
        </div>
    </div>

    <script>
        // Глобальные переменные
        let currentUser = null;
        let workouts = [];

        // Инициализация при загрузке
        window.addEventListener('load', function() {
            console.log('Страница загружена');
            loadUserData();
            setupEventListeners();
        });

        // Настройка обработчиков событий
        function setupEventListeners() {
            console.log('Настройка обработчиков');
            
            // Регистрация
            const registerBtn = document.getElementById('registerBtn');
            if (registerBtn) {
                registerBtn.addEventListener('click', register);
                console.log('Кнопка регистрации найдена');
            } else {
                console.error('Кнопка регистрации не найдена!');
            }

            // Добавить тренировку            const addWorkoutBtn = document.getElementById('addWorkoutBtn');
            if (addWorkoutBtn) {
                addWorkoutBtn.addEventListener('click', function() {
                    document.getElementById('workoutModal').classList.add('show');
                });
            }

            // Сохранить тренировку
            const saveWorkoutBtn = document.getElementById('saveWorkoutBtn');
            if (saveWorkoutBtn) {
                saveWorkoutBtn.addEventListener('click', saveWorkout);
            }

            // Отмена тренировки
            const cancelWorkoutBtn = document.getElementById('cancelWorkoutBtn');
            if (cancelWorkoutBtn) {
                cancelWorkoutBtn.addEventListener('click', function() {
                    document.getElementById('workoutModal').classList.remove('show');
                });
            }

            // История
            const historyBtn = document.getElementById('historyBtn');
            if (historyBtn) {
                historyBtn.addEventListener('click', function() {
                    showPage('historyPage');
                    loadHistory();
                });
            }

            // Назад на главную
            const backToMain = document.getElementById('backToMain');
            if (backToMain) {
                backToMain.addEventListener('click', function() {
                    showPage('mainPage');
                });
            }

            // Закрытие модального окна по клику вне
            document.getElementById('workoutModal').addEventListener('click', function(e) {
                if (e.target === this) {
                    this.classList.remove('show');
                }
            });
        }

        // Загрузка данных пользователя
        function loadUserData() {
            try {
                const savedUser = localStorage.getItem('workout_user');                const savedWorkouts = localStorage.getItem('workout_data');

                console.log('Загрузка данных:', savedUser ? 'найдено' : 'не найдено');

                if (savedUser) {
                    currentUser = JSON.parse(savedUser);
                    workouts = savedWorkouts ? JSON.parse(savedWorkouts) : [];
                    showPage('mainPage');
                    updateUI();
                } else {
                    showPage('registerPage');
                }
            } catch (e) {
                console.error('Ошибка загрузки:', e);
                showPage('registerPage');
            }
        }

        // Регистрация
        function register() {
            console.log('Кнопка регистрации нажата');
            
            const usernameInput = document.getElementById('regUsername');
            const weightInput = document.getElementById('regWeight');
            const heightInput = document.getElementById('regHeight');

            if (!usernameInput || !weightInput || !heightInput) {
                alert('Ошибка: поля не найдены!');
                return;
            }

            const username = usernameInput.value.trim();
            const weight = weightInput.value;
            const height = heightInput.value;

            console.log('Введённые данные:', username, weight, height);

            if (!username) {
                alert('Введи свой Telegram ник!');
                return;
            }

            currentUser = {
                username: username.startsWith('@') ? username : '@' + username,
                weight: weight || null,
                height: height || null,
                registeredAt: new Date().toISOString()
            };

            localStorage.setItem('workout_user', JSON.stringify(currentUser));            console.log('Данные сохранены:', currentUser);
            
            alert('✅ Регистрация успешна!');
            showPage('mainPage');
            updateUI();
        }

        // Обновление интерфейса
        function updateUI() {
            if (!currentUser) return;

            document.getElementById('displayUsername').textContent = currentUser.username;
            document.getElementById('totalWorkouts').textContent = workouts.length;
            
            const totalReps = workouts.reduce((sum, w) => sum + (w.reps || 0), 0);
            document.getElementById('totalReps').textContent = totalReps;
            
            const totalSets = workouts.reduce((sum, w) => sum + (w.sets || 0), 0);
            document.getElementById('totalSets').textContent = totalSets;
            
            const uniqueDays = new Set(workouts.map(w => w.date));
            document.getElementById('lastDays').textContent = uniqueDays.size;

            updateRecentWorkouts();
        }

        // Последние тренировки
        function updateRecentWorkouts() {
            const container = document.getElementById('recentWorkouts');
            
            if (workouts.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">🏋️</div>
                        <p>Пока нет тренировок</p>
                    </div>
                `;
                return;
            }

            const recent = workouts.slice(-3).reverse();
            container.innerHTML = recent.map(w => `
                <div class="workout-item">
                    <div class="workout-header">
                        <span class="workout-exercise">${w.exercise}</span>
                        <span class="workout-date">${new Date(w.date).toLocaleDateString('ru-RU')}</span>
                    </div>
                    <div class="workout-details">
                        <span>🔄 ${w.reps} повторений</span>
                        ${w.sets ? `<span>📋 ${w.sets} подходов</span>` : ''}                        ${w.weight ? `<span>⚖️ ${w.weight} кг</span>` : ''}
                    </div>
                </div>
            `).join('');
        }

        // История
        function loadHistory() {
            const list = document.getElementById('workoutList');
            
            if (workouts.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📜</div>
                        <p>История пуста</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = workouts.slice().reverse().map(w => `
                <div class="workout-item">
                    <div class="workout-header">
                        <span class="workout-exercise">${w.exercise}</span>
                        <span class="workout-date">${new Date(w.date).toLocaleDateString('ru-RU')}</span>
                    </div>
                    <div class="workout-details">
                        <span>🔄 ${w.reps} повторений</span>
                        ${w.sets ? `<span>📋 ${w.sets} подходов</span>` : ''}
                        ${w.weight ? `<span>⚖️ ${w.weight} кг</span>` : ''}
                    </div>
                </div>
            `).join('');
        }

        // Навигация
        function showPage(pageId) {
            console.log('Переключение на:', pageId);
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        // Сохранить тренировку
        function saveWorkout() {
            const exercise = document.getElementById('exercise').value.trim();
            const reps = parseInt(document.getElementById('reps').value);
            const sets = document.getElementById('sets').value ? parseInt(document.getElementById('sets').value) : null;
            const weight = document.getElementById('weight').value ? parseFloat(document.getElementById('weight').value) : null;

            if (!exercise || !reps) {                alert('Заполни название упражнения и повторения!');
                return;
            }

            const newWorkout = {
                id: Date.now(),
                exercise,
                reps,
                sets,
                weight,
                date: new Date().toISOString()
            };

            workouts.push(newWorkout);
            localStorage.setItem('workout_data', JSON.stringify(workouts));
            
            updateUI();
            document.getElementById('workoutModal').classList.remove('show');
            
            // Очистка полей
            document.getElementById('exercise').value = '';
            document.getElementById('reps').value = '';
            document.getElementById('sets').value = '';
            document.getElementById('weight').value = '';
            
            alert('✅ Тренировка добавлена!');
        }
    </script>
</body>
</html>
